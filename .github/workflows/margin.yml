name: Margin Info Fetch (Debug JPX PDF)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-margin-info:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip
          pip3 install requests pandas beautifulsoup4 lxml pdfplumber

      - name: Run margin-info scraper
        shell: python
        run: |
          import requests
          import pdfplumber
          from bs4 import BeautifulSoup
          import re

          UA = {"User-Agent": "Mozilla/5.0"}

          print("=== STEP 1: Fetch 05.html ===")
          jpx_page = "https://www.jpx.co.jp/markets/statistics-equities/margin/05.html"
          html = requests.get(jpx_page, headers=UA).text
          soup = BeautifulSoup(html, "lxml")

          print("=== STEP 2: Extract PDF links ===")
          pdf_links = []
          for a in soup.find_all("a", href=True):
              href = a["href"]
              if href.endswith(".pdf") and "syumatsu" in href:
                  full = "https://www.jpx.co.jp" + href
                  pdf_links.append(full)
                  print("FOUND PDF:", full)

          if not pdf_links:
              raise Exception("JPX PDF が見つかりません")

          latest_pdf = sorted(pdf_links)[-1]
          print("=== STEP 3: Latest PDF ===")
          print(latest_pdf)

          print("=== STEP 4: Download PDF ===")
          pdf_data = requests.get(latest_pdf, headers=UA).content
          with open("jpx.pdf", "wb") as f:
              f.write(pdf_data)
          print("PDF saved as jpx.pdf")

          print("=== STEP 5: DEBUG — PDF TEXT OUTPUT START ===")
          with pdfplumber.open("jpx.pdf") as pdf:
              for i, page in enumerate(pdf.pages):
                  print(f"\n--- PAGE {i+1} ---")
                  text = page.extract_text()
                  print(text)
          print("=== DEBUG — PDF TEXT OUTPUT END ===")
