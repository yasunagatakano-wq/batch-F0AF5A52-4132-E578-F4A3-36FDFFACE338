name: Margin Info Fetch (taisyaku.jp CSV)

on:
  schedule:
    - cron: "0 18 * * *"   # JST 3:00（UTC 18:00）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-margin-info:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip
          pip3 install requests pandas

      - name: Run margin-info scraper
        shell: python
        run: |
          import requests
          import pandas as pd
          import json

          BASE = "https://www.taisyaku.jp/download/"

          # ============================
          # 1. CSV ダウンロード
          # ============================
          weekly_url = BASE + "syuyou_weekly.csv"
          daily_url  = BASE + "syuyou_daily.csv"
          list_url   = BASE + "taisyaku_list.csv"
          reg_url    = BASE + "regulation.csv"

          weekly_df = pd.read_csv(weekly_url, encoding="shift_jis", dtype=str)
          daily_df  = pd.read_csv(daily_url,  encoding="shift_jis", dtype=str)
          list_df   = pd.read_csv(list_url,   encoding="shift_jis", dtype=str)
          reg_df    = pd.read_csv(reg_url,    encoding="shift_jis", dtype=str)

          # ============================
          # 2. 貸借銘柄一覧
          # ============================
          taisyaku_set = set(list_df["銘柄コード"].astype(str).str.zfill(4))

          # ============================
          # 3. 週末残高
          # ============================
          weekly_map = {}
          for _, row in weekly_df.iterrows():
              code = str(row["銘柄コード"]).zfill(4)
              weekly_map[code] = {
                  "buy": int(row["買残"]) if row["買残"].isdigit() else None,
                  "sell": int(row["売残"]) if row["売残"].isdigit() else None
              }

          # ============================
          # 4. 日々公表
          # ============================
          daily_map = {}
          for _, row in daily_df.iterrows():
              code = str(row["銘柄コード"]).zfill(4)
              daily_map[code] = {
                  "buy": int(row["買残"]) if row["買残"].isdigit() else None,
                  "sell": int(row["売残"]) if row["売残"].isdigit() else None
              }

          # ============================
          # 5. 規制情報
          # ============================
          regulation_map = {}
          for _, row in reg_df.iterrows():
              code = str(row["銘柄コード"]).zfill(4)
              reason = row["規制内容"]
              regulation_map.setdefault(code, []).append(reason)

          # ============================
          # 6. margin.json を生成
          # ============================
          margin = {}

          all_codes = set(weekly_map.keys()) | set(daily_map.keys()) | set(taisyaku_set)

          for code in sorted(all_codes):
              if code in daily_map:
                  buy = daily_map[code]["buy"]
                  sell = daily_map[code]["sell"]
                  balance_type = "daily"
              else:
                  buy = weekly_map.get(code, {}).get("buy")
                  sell = weekly_map.get(code, {}).get("sell")
                  balance_type = "weekly"

              ratio = None
              if buy and sell and sell != 0:
                  ratio = round(buy / sell, 2)

              margin[code] = {
                  "貸借銘柄": code in taisyaku_set,
                  "制度信用": code in taisyaku_set,
                  "一般信用": None,
                  "信用買い残": buy,
                  "信用売り残": sell,
                  "信用倍率": ratio,
                  "残高種別": balance_type,
                  "規制": regulation_map.get(code, [])
              }

          with open("margin.json", "w", encoding="utf-8") as f:
              json.dump(margin, f, ensure_ascii=False, indent=2)

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add margin.json || true
          git commit -m "Auto-update margin.json (taisyaku.jp CSV)" || echo "No changes to commit"
          git push
