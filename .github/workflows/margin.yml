name: Margin Info Fetch (JPX Only)

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-margin-info:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip
          pip3 install requests pandas beautifulsoup4 lxml pdfplumber

      - name: Run margin-info scraper
        shell: python
        run: |
          import requests
          import pandas as pd
          import json
          import re
          import pdfplumber
          from bs4 import BeautifulSoup

          UA = {"User-Agent": "Mozilla/5.0"}

          # ============================
          # JSF meigara.csvпјҲиІёеҖҹйҠҳжҹ„еҲӨе®ҡз”Ёпјү
          # ============================
          base = "https://www.taisyaku.jp/data/"
          meigara_df = pd.read_csv(
              base + "meigara.csv",
              encoding="shift_jis",
              dtype=str,
              skiprows=1
          )
          meigara_df.columns = meigara_df.columns.str.strip().str.replace("\ufeff", "", regex=False)

          taisyaku_set = set()
          for _, row in meigara_df.iterrows():
              code = str(row["гӮігғјгғү"]).zfill(4)
              kubun = row["иІёеҖҹйҠҳжҹ„еҢәеҲҶпјҲжқұиЁјпјү"]
              if kubun in ("1", "2"):
                  taisyaku_set.add(code)

          # ============================
          # JSF seigenichiran.csvпјҲиҰҸеҲ¶жғ…е ұпјү
          # ============================
          sei_df = pd.read_csv(
              base + "seigenichiran.csv",
              encoding="shift_jis",
              dtype=str,
              skiprows=4
          )
          sei_df = sei_df.iloc[:-3]
          sei_df.columns = sei_df.columns.str.strip().str.replace("\ufeff", "", regex=False)

          regulation_map = {}
          for _, row in sei_df.iterrows():
              code = str(row["йҠҳжҹ„гӮігғјгғү"]).zfill(4)
              reason = f'{row["е®ҹж–ҪжҺӘзҪ®"]}:{row["е®ҹж–ҪеҶ…е®№"]}'
              regulation_map.setdefault(code, []).append(reason)

          # ============================
          # жҘҪеӨ© дёҖиҲ¬дҝЎз”Ё
          # ============================
          rakuten_url = "https://www.rakuten-sec.co.jp/web/market/search/general_margin/"
          html = requests.get(rakuten_url, headers=UA).text
          soup = BeautifulSoup(html, "lxml")

          general_map = {}
          for row in soup.select("table tr"):
              cols = row.find_all("td")
              if len(cols) >= 3:
                  code = cols[0].get_text(strip=True)
                  if re.fullmatch(r"\d{4}", code):
                      status = cols[2].get_text(strip=True)
                      general_map[code] = {
                          "еЈІгӮҠе»әгҒҰ": status != "Г—",
                          "еңЁеә«еҢәеҲҶ": status,
                          "еңЁеә«ж•°йҮҸ": None
                      }

          # ============================
          # JPX йҖұжң«дҝЎз”Ёж®ӢпјҲ05.html вҶ’ PDFпјү
          # ============================
          jpx_page = "https://www.jpx.co.jp/markets/statistics-equities/margin/05.html"
          jpx_html = requests.get(jpx_page, headers=UA).text
          jpx_soup = BeautifulSoup(jpx_html, "lxml")

          pdf_links = []
          for a in jpx_soup.find_all("a", href=True):
              href = a["href"]
              if href.endswith(".pdf") and "syumatsu" in href:
                  pdf_links.append("https://www.jpx.co.jp" + href)

          latest_pdf = sorted(pdf_links)[-1]

          pdf_data = requests.get(latest_pdf, headers=UA).content
          with open("jpx.pdf", "wb") as f:
              f.write(pdf_data)

          # ============================
          # JPX PDF гғ‘гғјгӮ№пјҲеЈІж®Ӣгғ»еЈІж®ӢеүҚйҖұжҜ”гғ»иІ·ж®Ӣгғ»иІ·ж®ӢеүҚйҖұжҜ”пјү
          # ============================
          jpx_map = {}

          # в–І гҒЁж•°еӯ—гҒ®й–“гҒ«гӮ№гғҡгғјгӮ№гҒҢе…ҘгӮӢгӮұгғјгӮ№гҒ«еҜҫеҝң
          pattern = re.compile(
              r"(\d{5})\s+JP\d{10}\s+([\d,]+)\s+([в–І\-\d,\s]+)\s+([\d,]+)\s+([в–І\-\d,\s]+)"
          )

          def parse_diff(s):
              s = s.replace(",", "").replace(" ", "")
              if s in ("в–І", "-", ""):
                  return 0
              if s.startswith("в–І"):
                  return -int(s[1:])
              return int(s)

          with pdfplumber.open("jpx.pdf") as pdf:
              for page in pdf.pages:
                  text = page.extract_text()
                  if not text:
                      continue

                  for line in text.split("\n"):
                      m = pattern.search(line)
                      if m:
                          code5 = m.group(1)
                          code4 = code5[:4]

                          sell = int(m.group(2).replace(",", ""))
                          sell_diff = parse_diff(m.group(3))

                          buy = int(m.group(4).replace(",", ""))
                          buy_diff = parse_diff(m.group(5))

                          ratio = round(buy / sell, 2) if sell != 0 else None

                          jpx_map[code4] = {
                              "buy": buy,
                              "buy_diff": buy_diff,
                              "sell": sell,
                              "sell_diff": sell_diff,
                              "ratio": ratio
                          }

          # ============================
          # margin.json зөұеҗҲпјҲJSF дҝЎз”Ёж®ӢгҒҜеүҠйҷӨпјү
          # ============================
          margin = {}
          all_codes = set(taisyaku_set) | set(jpx_map.keys()) | set(general_map.keys())

          for code in sorted(all_codes):
              jpx = jpx_map.get(code, {})

              margin[code] = {
                  "иІёеҖҹйҠҳжҹ„": code in taisyaku_set,
                  "дёҖиҲ¬дҝЎз”Ё": general_map.get(code, {
                      "еЈІгӮҠе»әгҒҰ": False,
                      "еңЁеә«еҢәеҲҶ": None,
                      "еңЁеә«ж•°йҮҸ": None
                  }),
                  "JPXдҝЎз”ЁиІ·ж®Ӣ": jpx.get("buy"),
                  "JPXдҝЎз”ЁиІ·ж®ӢеүҚйҖұжҜ”": jpx.get("buy_diff"),
                  "JPXдҝЎз”ЁеЈІж®Ӣ": jpx.get("sell"),
                  "JPXдҝЎз”ЁеЈІж®ӢеүҚйҖұжҜ”": jpx.get("sell_diff"),
                  "JPXдҝЎз”ЁеҖҚзҺҮ": jpx.get("ratio"),
                  "иҰҸеҲ¶": regulation_map.get(code, [])
              }

          with open("margin.json", "w", encoding="utf-8") as f:
              json.dump(margin, f, ensure_ascii=False, indent=2)

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add margin.json || true
          git commit -m "Auto-update margin.json" || echo "No changes to commit"
          git push
